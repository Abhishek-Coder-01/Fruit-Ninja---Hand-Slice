<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fruit Ninja · Hand Slice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { gold: '#f9a826', danger: '#ff3b5c', success: '#22d46e', dark: '#050a10' },
                    fontFamily: { bangers: ['Bangers', 'cursive'], nunito: ['Nunito', 'sans-serif'] },
                    backdropBlur: { xl: '16px' }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin></script>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div class="fixed inset-0 w-screen h-screen overflow-hidden bg-black" id="wrap">
        <canvas id="cam"></canvas>
        <canvas id="gc"></canvas>

        <!-- HUD -->
        <div id="hud" class="absolute inset-0 z-[4] pointer-events-none p-3.5 flex flex-col justify-between">
            <div class="flex items-start justify-between gap-1 sm:gap-2.5">
                <div
                    class="flex items-center gap-1.5 sm:gap-3 bg-[#0b1220dd] backdrop-blur-xl border border-[#f9a82644] rounded-full px-3 py-1.5 sm:px-6 sm:py-2">
                    <span
                        class="font-bangers text-[1rem] sm:text-[clamp(0.9rem,2.5vw,1.1rem)] text-gray-500 tracking-[1px] sm:tracking-[3px]">SCORE</span>
                    <span class="score-val text-[1rem] sm:text-[clamp(1.2rem,3vw,1.8rem)] font-bold text-yellow-400"
                        id="scoreVal">0</span>
                    <span id="comboPill"
                        class="bg-white/5 border border-white/10 rounded-full px-2 sm:px-3.5 py-0.5 font-bangers text-[0.8rem] sm:text-[clamp(0.9rem,2.2vw,1.3rem)] text-gray-400 tracking-wide transition-all duration-150">x1</span>
                </div>
                <div class="flex items-center gap-0.5 sm:gap-1.5 bg-[#0b1220dd] backdrop-blur-xl border border-[#ff3b5c44] rounded-full px-2 sm:px-4 py-1 sm:py-2"
                    id="livesBox">
                    <span
                        class="heart text-[1.2rem] sm:text-[clamp(1.3rem,3.5vw,1.8rem)] transition-transform duration-150"
                        id="h1">❤️</span>
                    <span
                        class="heart text-[1.2rem] sm:text-[clamp(1.3rem,3.5vw,1.8rem)] transition-transform duration-150"
                        id="h2">❤️</span>
                    <span
                        class="heart text-[1.2rem] sm:text-[clamp(1.3rem,3.5vw,1.8rem)] transition-transform duration-150"
                        id="h3">❤️</span>
                </div>
            </div>
            <div id="powerBar" class="flex gap-2 justify-center flex-wrap px-2 pointer-events-none"></div>
            <div class="flex items-end justify-between pointer-events-auto mb-1.5">
                <div
                    class="text-[10px] sm:text-[clamp(.7rem,1.8vw,.9rem)] bg-black/60 backdrop-blur-sm border border-white/10 rounded-full py-1 px-3 sm:py-1.5 sm:px-3.5 text-gray-400 sm:text-gray-500 max-w-[60%] sm:max-w-none">
                    ☝️ Slice with your index finger — bombs cost a life!
                </div>
                <button id="restartBtn"
                    class="btn-3d bg-gradient-to-br from-yellow-400 to-orange-500 text-orange-950 font-bangers tracking-wide sm:tracking-[2px] text-sm sm:text-[clamp(1.1rem,3vw,1.6rem)] px-[20px] py-[8px] md:px-8 md:py-4 rounded-full border-0 cursor-pointer whitespace-nowrap active:scale-95 transition">
                    ⟳ RESTART
                </button>
            </div>
        </div>

        <!-- OVERLAY -->
        <div id="overlay"
            class="absolute inset-0 z-10 bg-black backdrop-blur-xl flex flex-col items-center justify-center gap-5 text-white pointer-events-auto">
            <div class="ov-title" id="ovTitle">FRUIT NINJA</div>
            <p class="text-gray-400 text-[clamp(.95rem,2.5vw,1.3rem)] text-center px-6 max-w-md font-nunito" id="ovSub">
                Use your index finger to slice fruits! Special items grant power-ups.</p>
            <div id="ovScore"
                class="hidden font-bangers text-[clamp(1.8rem,5vw,2.8rem)] bg-white/5 border border-gold rounded-[80px] py-2.5 px-12 text-gold">
            </div>
            <div id="ovStats" class="hidden flex gap-4 flex-wrap justify-center">
                <div
                    class="bg-white/5 border border-white/10 rounded-2xl p-2.5 text-center text-[clamp(.85rem,2.2vw,1rem)] text-gray-500 px-5 font-nunito">
                    <b class="block text-[1.5em] text-white mb-0.5" id="statSliced">0</b>Sliced
                </div>
                <div
                    class="bg-white/5 border border-white/10 rounded-2xl p-2.5 text-center text-[clamp(.85rem,2.2vw,1rem)] text-gray-500 px-5 font-nunito">
                    <b class="block text-[1.5em] text-white mb-0.5" id="statMissed">0</b>Missed
                </div>
                <div
                    class="bg-white/5 border border-white/10 rounded-2xl p-2.5 text-center text-[clamp(.85rem,2.2vw,1rem)] text-gray-500 px-5 font-nunito">
                    <b class="block text-[1.5em] text-white mb-0.5" id="statBest">0</b>Best Combo
                </div>
                <div
                    class="bg-white/5 border border-white/10 rounded-2xl p-2.5 text-center text-[clamp(.85rem,2.2vw,1rem)] text-gray-500 px-5 font-nunito">
                    <b class="block text-[1.5em] text-gold mb-0.5" id="statHigh">0</b>Best Score
                </div>
            </div>
            <button
                class="btn-3d bg-gradient-to-br from-gold to-orange-500 text-orange-950 font-bangers tracking-[2px] text-[clamp(1.1rem,3vw,1.6rem)] px-9 py-3 rounded-full border-0 cursor-pointer"
                id="startBtn">▶ PLAY NOW</button>
            <div id="loadBar">
                <span class="loading-bar-fill gap-2">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" class="black-loading-animation">
                        <g clip-path="url(#c0)">
                            <path
                                d="M10 1.668C5.4 1.668 1.668 5.4 1.668 10c0 4.6 3.732 8.332 8.332 8.332 4.6 0 8.332-3.732 8.332-8.332"
                                stroke="url(#lg0)" stroke-width="2" stroke-linecap="round" />
                            <path
                                d="M10 1.668C5.4 1.668 1.668 5.4 1.668 10c0 4.6 3.732 8.332 8.332 8.332 4.6 0 8.332-3.732 8.332-8.332"
                                stroke="url(#lg1)" stroke-width="2" stroke-linecap="round" />
                        </g>
                        <defs>
                            <linearGradient id="lg0" x1="14" y1="3.5" x2="1" y2="9" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#666" stop-opacity=".01" />
                                <stop offset="1" stop-color="#666" />
                            </linearGradient>
                            <linearGradient id="lg1" x1="7.7" y1="2.8" x2="14.4" y2="7.4"
                                gradientUnits="userSpaceOnUse">
                                <stop stop-color="#666" />
                                <stop offset="1" stop-color="#666" stop-opacity=".01" />
                            </linearGradient>
                            <clipPath id="c0">
                                <rect width="20" height="20" fill="white" />
                            </clipPath>
                        </defs>
                    </svg>
                    <span class="text-gray-500">Loading camera…</span>
                </span>
            </div>
        </div>
        <!-- MOBILE ROTATE MESSAGE -->
        <div id="rotateMsg"
            class="hidden fixed top-4 left-1/2 -translate-x-1/2 z-[100] bg-black/80 backdrop-blur-md border border-white/10 px-6 py-3 rounded-full text-white font-nunito text-sm sm:text-base pointer-events-none shadow-2xl transition-all duration-700 opacity-0 -translate-y-4">
            Rotate your phone for a better experience
        </div>

        <!-- COUNTDOWN OVERLAY -->
        <div id="countdownOverlay"
            class="hidden absolute inset-0 z-[50] bg-black/40 backdrop-blur-sm flex items-center justify-center pointer-events-none transition-opacity duration-300">
            <div id="countdownText"
                class="font-bangers text-[clamp(6rem,20vw,12rem)] text-gold drop-shadow-[0_0_20px_rgba(249,168,38,0.5)]">
                3</div>
        </div>
    </div>

    <script src="./script.js"></script>
</body>

</html>
